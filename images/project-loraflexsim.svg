<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">LoRaFlexSim architecture</title>
  <desc id="desc">Abstract visual of modular LoRa and LoRaWAN simulation layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#103151"/>
      <stop offset="100%" stop-color="#0b1f34"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="28"/>
  <g fill="#7fd0ff" opacity="0.9">
    <rect x="70" y="80" width="210" height="90" rx="14"/>
    <rect x="295" y="80" width="210" height="90" rx="14"/>
    <rect x="520" y="80" width="210" height="90" rx="14"/>
    <rect x="70" y="220" width="300" height="90" rx="14" fill="#2ca6ff"/>
    <rect x="390" y="220" width="340" height="90" rx="14"/>
    <rect x="70" y="360" width="660" height="70" rx="14" fill="#95ddff"/>
  </g>
  <g stroke="#d8f2ff" stroke-width="4" opacity="0.8">
    <line x1="175" y1="170" x2="220" y2="220"/>
    <line x1="400" y1="170" x2="320" y2="220"/>
    <line x1="625" y1="170" x2="560" y2="220"/>
    <line x1="220" y1="310" x2="220" y2="360"/>
    <line x1="560" y1="310" x2="560" y2="360"/>
  </g>
</svg>
